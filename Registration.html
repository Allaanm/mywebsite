<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" type="text/css">
    <link rel="stylesheet" href="./css/Registration.css" type="text/css">
    <title>Get in Touch</title>
</head>

<body>
    <header class="main-nav">
        <nav>
            <ul>
                <li>
                    <a href="index.html" class="nav-link">
                        About
                    </a>
                </li>
                <li>
                    <a href="contact.html" class="nav-link">
                        Contact me
                    </a>
                </li>

                <li>
                    <a href="Registration.html" class="nav-link">
                        Register
                    </a>

                </li>

                <li>
                    <a href="login.html" class="nav-link">
                        Login
                    </a>

                </li>
            </ul>
        </nav>
    </header>
    <main>

        <div>
            <h1>Not a member?</h1>
            <p>Fill the form below to join</p>
        </div>

        <form id="registration-form" action="#">
            <fieldset>
                <div>
                    <label for="first-name">Your first name</label>
                    <input id="first-name" type="text" placeholder="" required>
                </div>
                <div>
                    <label for="last-name">Your last name</label>
                    <input id="last-name" type="text" placeholder="" required>
                </div>
            </fieldset>
            <fieldset>
                <div>
                    <label for="phone">Phone number</label>
                    <input id="phone" type="tel" placeholder="" required>
                </div>
                <div>
                    <label for="gender">Gender</label>
                    <select id="gender" name="select" required>
                        <option value="select">-select-</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                        <option value="rather not say">Rather not say</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <div>
                    <label for="country">Country</label>
                    <input id="country" type="text" placeholder="" required>

                </div>
                <div>
                    <label for="state-province">State/Province</label>
                    <input id="state-province" type="text" placeholder="" required>
                </div>
            </fieldset>
            <div>
                <label for="email">Your email</label>
                <input id="email" type="email" placeholder="" required>
            </div>
            <fieldset>
                <div>
                    <label for="password">Password</label>
                    <input id="password" type="password" required>

                </div>
                <div>
                    <label for="confirm-password">Confirm Password</label>
                    <input id="confirm-password" type="password" required>
                </div>
            </fieldset>

            <a href="login.html">Have an account?Tap here</a>
            <input type="submit">
        </form>
    </main>
   

</body>

</html>
